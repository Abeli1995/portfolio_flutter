name: Update Portfolio Content

on:
  workflow_dispatch:
    inputs:
      content_json:
        description: Full JSON for content/portfolio_content.json
        required: true
        type: string

permissions:
  contents: write

jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate and save JSON
        env:
          CONTENT_JSON: ${{ inputs.content_json }}
        run: |
          mkdir -p content assets/data
          printf '%s' "$CONTENT_JSON" | jq '.' > content/portfolio_content.json
          cp content/portfolio_content.json assets/data/portfolio_content.json

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/portfolio_content.json assets/data/portfolio_content.json
          git commit -m "chore: update portfolio content"
          git push
